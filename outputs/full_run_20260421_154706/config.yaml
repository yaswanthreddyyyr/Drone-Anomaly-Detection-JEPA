anomaly_detection:
  error_aggregation: max
  error_normalization: true
  method: reconstruction_error
  n_mask_samples: 5
  threshold_method: percentile
  threshold_percentile: 95
chunking:
  chunk_size: 20
  min_chunk_size: 15
  stride: 10
data:
  processed_dir: processed_data_enhanced
  raw_dir: data/drone_temparing_dataset_v2
device: auto
features:
  base_features:
  - latitude
  - longitude
  - altitude
  - speed
  - heading
  derived_features:
  - delta_lat
  - delta_lon
  - delta_alt
  - acceleration
  - angular_velocity
  - distance
  - jerk
  - angular_acceleration
  - altitude_jerk
  - speed_std_5
  - heading_std_5
  - altitude_std_5
  use_derived: true
  use_second_order: true
  use_windowed_stats: true
  window_size: 5
isolation_forest:
  contamination: 0.05
  max_samples: auto
  n_estimators: 100
  random_state: 42
masking:
  adaptive: true
  entropy_features:
  - speed
  - heading
  - altitude
  entropy_window: 5
  max_mask_ratio: 0.5
  min_mask_ratio: 0.2
model:
  dropout: 0.1
  embedding_dim: 256
  encoder_hidden:
  - 512
  - 256
  - 256
  predictor_hidden:
  - 256
  - 256
  use_attention: true
normalization:
  clip_outliers: true
  clip_percentile:
  - 1
  - 99
  method: robust
num_workers: 4
seed: 42
splits:
  test:
    balanced:
      profiles:
      - balanced
      replicates:
      - rep_03
    strong:
      profiles:
      - strong
      replicates:
      - rep_00
      - rep_01
      - rep_02
      - rep_03
    subtle:
      profiles:
      - subtle
      replicates:
      - rep_00
      - rep_01
      - rep_02
      - rep_03
  train:
    extract_normal_from_anomaly: true
    profiles:
    - balanced
    replicates:
    - rep_00
    - rep_01
    use_only_normal: false
  validation:
    profiles:
    - balanced
    replicates:
    - rep_02
training:
  batch_size: 256
  epochs: 150
  learning_rate: 0.001
  scheduler: cosine
  warmup_epochs: 5
  weight_decay: 0.0001
